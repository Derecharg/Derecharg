<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Pago Exitoso! - Derecharg</title>
    <meta name="description" content="Gracias por tu compra. En breve recibirás el material en tu correo.">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        .thank-you-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-light);
            text-align: center;
            padding: 20px;
        }

        .success-card {
            background-color: var(--bg-white);
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 51, 102, 0.1);
            max-width: 600px;
            width: 100%;
            border-top: 5px solid #25D366;
            /* Verde éxito */
        }

        .success-icon {
            font-size: 5rem;
            color: #25D366;
            margin-bottom: 20px;
        }

        .success-card h1 {
            font-family: var(--font-heading);
            color: #003366;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        .success-card p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .success-message {
            background-color: rgba(230, 180, 0, 0.1);
            border: 1px solid #e6b400;
            padding: 15px;
            border-radius: 8px;
            color: #003366;
            font-weight: 600;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        .btn-return {
            display: inline-block;
            background-color: #003366;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-return:hover {
            background-color: #002244;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 51, 102, 0.2);
        }

        .logo-thanks {
            width: 150px;
            margin-bottom: 30px;
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-XXXXXXXXXX');
    </script>
</head>

<body>
    <div class="thank-you-page">
        <div class="success-card">
            <img src="logo_derecharg.png" alt="Derecharg Logo" class="logo-thanks">
            <div class="success-icon">✅</div>
            <h1>¡Pago Confirmado!</h1>

            <div class="success-message">
                En breve recibirás el material en tu correo.
            </div>

            <p>
                Tu transacción se ha procesado correctamente. Revisa tu bandeja de entrada (y la carpeta de spam) en los
                próximos minutos para acceder a tus apuntes de Derecharg.
            </p>

            <a href="index.html" class="btn-return">Volver al Inicio</a>
        </div>
    </div>
</body>

</html>
